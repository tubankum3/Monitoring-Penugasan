<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Penugasan Biro Advokasi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header-left">
            <div class="brand-mark">BA</div>
            <div class="header-titles">
                <div class="header-title">Monitoring Penugasan</div>
                <div class="header-subtitle">Dashboard Real-time &mdash; Biro Advokasi</div>
            </div>
        </div>

        <div class="header-right">
            <div class="live-badge">
                <div class="live-dot"></div>
                <span class="live-text">LIVE</span>
            </div>
            <div class="sep"></div>
            <div class="header-date" id="date-display">&nbsp;</div>
            <div class="header-clock" id="clock-display">--:--:--</div>
        </div>
    </header>

    <div class="controls-bar">
        <div class="tabs" id="sheet-tabs">
            <button class="tab-btn active" data-sheet="ST Perkara">ST Perkara</button>
            <button class="tab-btn" data-sheet="ST Pendampingan">ST Pendampingan</button>
            <button class="tab-btn" data-sheet="ST Lain-Lain">ST Lain-Lain</button>
        </div>
        <div class="filters" id="date-filters">
            <button class="filter-btn active" data-filter="all">Semua Waktu</button>
            <button class="filter-btn" data-filter="today">Hari Ini</button>
            <button class="filter-btn" data-filter="thisWeek">Minggu Ini</button>
            <button class="filter-btn" data-filter="thisMonth">Bulan Ini</button>
        </div>
    </div>

    <div class="progress-bar" id="progress-bar"></div>

    <div class="data-container" id="data-container">
        <table class="data-table">
            <thead>
                <tr id="table-head-row">
                    <th>Memuat Data...</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
