<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Penugasan Biro Advokasi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header-left">
            <div class="brand-mark">BA</div>
            <div class="header-titles">
                <div class="header-title">Monitoring Penugasan</div>
                <div class="header-subtitle">Biro Advokasi</div>
            </div>
        </div>

        <div class="header-right">
            <div class="live-badge">
                <div class="live-dot"></div>
                <span class="live-text">LIVE</span>
            </div>
            <div class="sep"></div>
            <div class="header-date" id="date-display">&nbsp;</div>
            <div class="header-clock" id="clock-display">--:--:--</div>
        </div>
    </header>

    <div class="progress-bar" id="progress-bar"></div>

    <div class="tableau-container" id="tableau-container">

        <div class="embed-placeholder">
            <svg class="icon" width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="6" y="6" width="60" height="60" rx="8" stroke="#0D1B2A" stroke-width="3.5"/>
                <rect x="14" y="24" width="14" height="28" rx="3" fill="#C8A84B"/>
                <rect x="32" y="32" width="14" height="20" rx="3" fill="#0D1B2A"/>
                <rect x="50" y="18" width="8" height="34" rx="3" fill="#C8A84B" opacity="0.55"/>
                <line x1="14" y1="18" x2="58" y2="18" stroke="#0D1B2A" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
            <p class="label">
                Paste Tableau embed code di dalam
                <code>#tableau-container</code>
            </p>
        </div>

        </div><script src="script.js"></script>

</body>
</html>
